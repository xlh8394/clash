port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
external-controller: 127.0.0.1:9090
dns:
  enable: true
  ipv6: false
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - localhost.ptlogin2.qq.com
    - +.srv.nintendo.net
    - +.stun.playstation.net
    - +.msftconnecttest.com
    - +.msftncsi.com
    - +.xboxlive.com
    - msftconnecttest.com
    - xbox.*.microsoft.com
    - "*.battlenet.com.cn"
    - "*.battlenet.com"
    - "*.blzstatic.cn"
    - "*.battle.net"
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
    - https://dns.alidns.com/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
pr:
  &a3
  type: select
  proxies:
    - ♻️ 自动选择
    - 🚀 手动切换
    - 🇭🇰 香港节点
    - 🇯🇵 日本节点
    - 🇺🇲 美国节点
    - 🇨🇳 台湾节点
    - 🇸🇬 狮城节点
    - DIRECT
p:
  &a1
  type: http
  interval: 86400
  health-check:
    enable: true
    url: http://www.gstatic.com/generate_204
    interval: 1800
auto:
  &a4
  type: url-test
  lazy: true
  url: http://www.gstatic.com/generate_204
  interval: 900
  use:
    - Subscribe
use:
  &a2
  type: select
  use:
    - Subscribe
c:
  &a6
  type: http
  behavior: classical
  interval: 86400
d:
  &a5
  type: http
  behavior: domain
  interval: 86400
i:
  &a7
  type: http
  behavior: ipcidr
  interval: 86400
proxy-providers:
  Subscribe:
    <<: *a1
    url: http://localhost:25500/sub?target=clash&new_name=true&url=https%3A%2F%2Ffuqing.ch%2Fsubscribe%2Fvzgmve-dvkh2elo%7Chttps%3A%2F%2Fv1.dogapi.yachts%2Fapi%2Fv1%2Fclient%2Fsubscribe%3Ftoken%3Dc929365b7c7c250d1eb50831f93196da%7C&insert=false&config=https%3A%2F%2Fcdn.jsdelivr.net%2Fgh%2FSleepyHeeead%2Fsubconverter-config%40master%2Fremote-config%2Fcustomized%2Fnexitally.ini
    path: ./proxy_providers/tmp.yaml
proxies: null
proxy-groups:
  - name: 🚀 手动切换
    <<: *a2
  - name: 🌏 全球加速
    <<: *a3
  - name: 🍎 苹果服务
    <<: *a3
  - name: 📺 哔哩哔哩
    type: select
    proxies:
      - DIRECT
      - 🇭🇰 香港节点
      - 🇨🇳 台湾节点
  - name: 📺 Emby
    proxies:
      - DIRECT
      - 🇸🇬 狮城节点
      - 🇺🇲 美国节点
      - 🇨🇳 台湾节点
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
    type: select
  - name: 🎥 奈飞视频
    proxies:
      - 🇸🇬 狮城节点
      - 🇺🇲 美国节点
      - 🇨🇳 台湾节点
      - 🇯🇵 日本节点
      - 🇭🇰 香港节点
    type: select
  - name: 🤖 OpenAi
    type: select
    proxies:
      - 🇺🇲 美国节点
  - name: 🎬 国际媒体
    <<: *a3
  - name: 🌌 谷歌服务
    <<: *a3
  - name: 📟 电报消息
    <<: *a3
  - name: 🐦 推特服务
    <<: *a3
  - name: 🎮 游戏平台
    <<: *a3
  - name: 🆎 AdBlock
    type: select
    proxies:
      - REJECT
  - name: 🐟 兜底分流
    <<: *a3
  - name: ♻️ 自动选择
    <<: *a4
  - name: 🇭🇰 香港节点
    <<: *a4
    filter: 港|HK|(?i)Hong
  - name: 🇯🇵 日本节点
    <<: *a4
    filter: 日|东京|JP|(?i)Japan
  - name: 🇨🇳 台湾节点
    <<: *a4
    filter: 台|湾|TW|(?i)Taiwan
  - name: 🇺🇲 美国节点
    <<: *a4
    filter: 美|US|(?i)States|American
  - name: 🇸🇬 狮城节点
    <<: *a4
    filter: 新|坡|SG|(?i)Singapore
